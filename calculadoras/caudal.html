<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <!-- Ajuste para celular -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Calculadora de caudal en tuberías · WR</title>

  <!-- Descripción para buscadores -->
  <meta
    name="description"
    content="Calcula el caudal en litros por segundo a partir del diámetro de una tubería y la velocidad del agua."
  >

  <!-- Tipografía -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- ../ sube una carpeta -->
  <link rel="stylesheet" href="../css/styles.css">

  <!-- defer espera al HTML y respeta el orden: primero el motor, luego la calculadora -->
  <script src="../js/units.js" defer></script>
  <script src="../js/caudal.js" defer></script>
</head>

<body>
  <!-- Encabezado con la marca del sitio (lleva a inicio) -->
  <header class="site-header">
    <a class="brand" href="../index.html">WR</a>
  </header>

  <main>
    <a class="back" href="../index.html">← Volver</a>

    <h1>Calculadora de caudal en tuberías</h1>

    <!-- Descripción breve y ecuación -->
    <section class="info">
      <p class="info__texto">
        Calcula el caudal volumétrico <var>Q</var> de una tubería a partir de su
        diámetro interior <var>d</var> y la velocidad media del fluido <var>v</var>.
      </p>
      <p class="info__ecuacion">
        <var>Q</var> = (π ∕ 4) · <var>d</var><sup>2</sup> · <var>v</var>
      </p>
    </section>

    <!-- Formulario de cálculo -->
    <form id="caudal-form">
      <label for="diametro">
        <span>Diámetro (<var>d</var>)</span>
        <span class="label-unidad" data-unidad="longitud"></span>
      </label>

      <input
        id="diametro"
        name="diametro"
        type="number"
        min="0"
        step="any"
        inputmode="decimal"
        required
      >

      <label for="velocidad">
        <span>Velocidad (<var>v</var>)</span>
        <span class="label-unidad" data-unidad="velocidad"></span>
      </label>

      <input
        id="velocidad"
        name="velocidad"
        type="number"
        min="0"
        step="any"
        inputmode="decimal"
        required
      >

      <button type="submit">Calcular</button>
    </form>

    <!-- Resultado -->
    <p id="resultado" aria-live="polite"></p>
  </main>
</body>
</html>
