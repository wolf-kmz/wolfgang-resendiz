<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <!-- Ajuste para celular -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Calculadora de caudal en tuberías | Wolfgang Reséndiz</title>

  <!-- Descripción para buscadores -->
  <meta
    name="description"
    content="Calcula el caudal en litros por segundo a partir del diámetro de una tubería y la velocidad del agua."
  >

  <!-- Tipografía -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- ../ sube una carpeta -->
  <link rel="stylesheet" href="../css/styles.css">

  <!-- defer espera al HTML y respeta el orden: primero el motor, luego la calculadora -->
  <script src="../js/units.js" defer></script>
  <script src="../js/caudal.js" defer></script>
</head>

<body>
  <main>
    <a class="back" href="../index.html">← Volver</a>

    <h1>Calculadora de caudal en tuberías</h1>

    <!-- Formulario de cálculo -->
    <form id="caudal-form">
      <label for="diametro">Diámetro</label>

      <input
        id="diametro"
        name="diametro"
        type="number"
        min="0"
        step="any"
        inputmode="decimal"
        required
      >

      <label for="velocidad">Velocidad</label>

      <input
        id="velocidad"
        name="velocidad"
        type="number"
        min="0"
        step="any"
        inputmode="decimal"
        required
      >

      <button type="submit">Calcular</button>
    </form>

    <!-- Resultado -->
    <p id="resultado" aria-live="polite"></p>
  </main>
</body>
</html>
